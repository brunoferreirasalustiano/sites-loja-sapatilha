<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - De Pietri</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #fff5f8; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px;
            box-sizing: border-box;
        }

        .login-card { 
            background: white; 
            padding: 50px 30px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(214,36,125,0.15); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid #f8d7da; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { color: #d6247d; margin-bottom: 25px; font-size: 24px; font-weight: 700; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border: 2px solid #f8d7da; 
            border-radius: 15px; 
            outline: none; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif;
            font-size: 16px; /* Evita zoom no iPhone */
            background: #fff;
        }

        input:focus { border-color: #d6247d; background: #fffcfd; }

        button { 
            width: 100%; 
            background: linear-gradient(135deg, #d6247d 0%, #b01d66 100%); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 35px; 
            font-weight: bold; 
            font-size: 18px;
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(214, 36, 125, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(214, 36, 125, 0.4); }

        /* --- FORÇANDO O TAMANHO NO MOBILE --- */
        @media (max-width: 650px) {
            .login-card {
                width: 95% !important; 
                min-height: 480px !important; /* Aqui garantimos que ele preencha a tela */
                padding: 50px 25px !important;
            }

            h2 { font-size: 28px !important; margin-bottom: 40px !important; }
            
            input { 
                height: 60px !important; 
                font-size: 18px !important; 
            }

            button { 
                height: 65px !important; 
                font-size: 20px !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Área Restrita</h2>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">ENTRAR</button>
        
        <div style="margin-top: 30px;">
            <a href="index.html" style="color: #999; text-decoration: none; font-size: 15px; font-weight: bold;">← Voltar para a Loja</a>
        </div>
    </div>

    <script>
        async function fazerLogin() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('senha').value;

            if(!user || !pass) {
                alert("Preencha todos os campos!");
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: user, senha: pass })
                });

                if (res.ok) {
                    localStorage.setItem("logadoDePietri", "true");
                    window.location.href = "admin.html";
                } else {
                    alert("Usuário ou senha incorretos!");
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        }
    </script>
</body>
</html>
