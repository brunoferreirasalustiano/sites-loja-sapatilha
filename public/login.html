<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - De Pietri</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fff5f8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(214,36,125,0.1); width: 100%; max-width: 320px; text-align: center; border: 1px solid #f8d7da; }
        h2 { color: #d6247d; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #f8d7da; border-radius: 10px; outline: none; box-sizing: border-box; }
        button { width: 100%; background: #d6247d; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b01d66; }
    </style>
</head>
<body>
    <div class="login-card">
    <h2>Área Restrita</h2>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">ENTRAR</button>
    
    <div style="margin-top: 20px;">
        <a href="index.html" style="color: #999; text-decoration: none; font-size: 13px;">← Voltar para a Loja</a>
    </div>
</div>

    <script>
        async function fazerLogin() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('senha').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: user, senha: pass })
            });

            if (res.ok) {
                // Aqui cria a autorização no seu navegador
                localStorage.setItem("logadoDePietri", "true");
                window.location.href = "admin.html"; // Vai para o painel de edição
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }
    </script>
</body>
</html>
